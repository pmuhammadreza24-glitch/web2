<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Communications</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .hero-slide {
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .slide-content {
            transition: all 0.6s ease 0.3s;
        }
    </style>
</head>

<body>

    <nav class="absolute top-0 left-0 w-full z-50 bg-black/30 border-b border-white/10">
        <div class="max-w-screen-xl mx-auto px-8 h-20 flex items-center justify-between">

            <a href="index.html" class="text-white text-3xl font-semibold">
                systems
            </a>

            <ul class="hidden md:flex items-center gap-8 text-white font-medium">
                <li><a href="index.html" class="hover:text-gray-300">Home</a></li>
                <li><a href="Strategy.html" class="hover:text-gray-300">Strategy</a></li>
                <li><a href="Communications.html" class="hover:text-orange-500">Communications</a></li>
                <li><a href="#" class="hover:text-gray-300">Insights</a></li>
                <li><a href="#" class="hover:text-gray-300">About</a></li>
                <li><a href="#" class="hover:text-gray-300">Careers</a></li>
            </ul>

            <button onclick="toggleMenu()" class="md:hidden text-white text-3xl">
                ☰
            </button>
        </div>

        <div id="mobileMenu" class="hidden md:hidden bg-black/90 text-white px-8 py-6">
            <ul class="space-y-4 text-lg">
                <li><a href="index.html" class="block hover:text-gray-300">Home</a></li>
                <li><a href="Strategy.html" class="block hover:text-gray-300">Strategy</a></li>
                <li><a href="Communications.html" class="block hover:text-orange-500">Communications</a></li>
                <li><a href="#" class="block hover:text-gray-300">Insights</a></li>
                <li><a href="#" class="block hover:text-gray-300">About</a></li>
                <li><a href="#" class="block hover:text-gray-300">Careers</a></li>
            </ul>
        </div>
    </nav>

    <div x-data="heroSlider()" x-init="init()" class="relative overflow-hidden"
        @mouseenter="autoplay = false" @mouseleave="autoplay = true">

        <div class="relative h-screen min-h-[760px]">

            <template x-for="(slide, index) in slides" :key="index">
                <div x-show="currentSlide === index"
                    x-transition.opacity.duration.800ms
                    class="absolute inset-0">

                    <div class="absolute inset-0">
                        <img :src="slide.image" :alt="slide.title" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-[#16002f]/70"></div>
                    </div>

                    <div class="relative z-10 max-w-screen-xl mx-auto px-8 h-full flex items-center">
                        <div class="max-w-5xl text-white slide-content">

                            <h2 x-text="slide.title"
                                class="text-[56px] md:text-[86px] lg:text-[96px] font-light leading-none mb-8">
                            </h2>

                            <p x-text="slide.description"
                                class="text-2xl md:text-3xl font-light max-w-4xl leading-snug">
                            </p>

                        </div>
                    </div>

                </div>
            </template>

            <button @click="prev()" class="absolute left-8 top-1/2 -translate-y-1/2 text-white z-20 text-5xl">
                ❮
            </button>

            <button @click="next()" class="absolute right-8 top-1/2 -translate-y-1/2 text-white z-20 text-5xl">
                ❯
            </button>

        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById("mobileMenu").classList.toggle("hidden");
        }

        function heroSlider() {
            return {
                currentSlide: 0,
                autoplay: true,

                slides: [
                    {
                        title: "Communications",
                        description: "Connecting businesses with smarter digital communication solutions.",
                        image: "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=1920"
                    },
                    {
                        title: "Digital Connectivity",
                        description: "Modern communication services for enterprises and customers.",
                        image: "https://images.unsplash.com/photo-1497366754035-f200968a6e72?w=1920"
                    },
                    {
                        title: "Reliable Networks",
                        description: "Building secure and scalable communication platforms.",
                        image: "https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=1920"
                    }
                ],

                init() {
                    setInterval(() => {
                        if (this.autoplay) {
                            this.next();
                        }
                    }, 5000);
                },

                next() {
                    this.currentSlide = (this.currentSlide + 1) % this.slides.length;
                },

                prev() {
                    this.currentSlide = (this.currentSlide - 1 + this.slides.length) % this.slides.length;
                }
            }
        }
    </script>

</body>

</html>
